<!DOCTYPE html>
<html>
<head>
    <title>Polymer Property Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2 class="text-center">Polymer Property Predictor</h2>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label for="Rg" class="form-label">Rg Value</label>
                        <input type="number" step="0.01" class="form-control" id="Rg" name="Rg" 
                               value="{{ rg_value }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Predict Properties</button>
                </form>
            </div>
        </div>

        {% if predictions %}
        <div class="card shadow mt-4">
            <div class="card-header bg-success text-white">
                <h3 class="text-center">Prediction Results</h3>
            </div>
            <div class="card-body">
                <div class="row">
                    {% for prop, value in predictions.items() %}
                    <div class="col-md-6 mb-3">
                        <strong>{{ prop }}:</strong> 
                        <span class="float-end">{{ value }}</span>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
